<!doctype html>
<html
  lang="en"
  x-data="{ dark: localStorage.getItem('dark') === 'true' }"
  x-init="$watch('dark', val => localStorage.setItem('dark', val))"
  :class="{ 'dark': dark }"
>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="images/initials_icon.svg" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700,800" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Emmet Hamell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    class="antialiased bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen transition-colors duration-300"
    style="font-family: 'Nunito', sans-serif;"
  >
    <!-- Navbar -->
    <nav class="flex justify-between items-center py-4 px-4 sm:px-8 lg:px-32">
      <a href="index.html">
        <img
          x-show="!dark"
          src="images/signature.png"
          alt="Signature"
          class="w-32 sm:w-40 lg:w-56"
        />
        <img
          x-show="dark"
          src="images/signature-white.png"
          alt="Signature-white"
          class="w-32 sm:w-40 lg:w-56"
        />
      </a>
      <div class="flex items-center space-x-2 sm:space-x-4 lg:space-x-6">
        <a href="about.html" class="hover:underline text-sm sm:text-base">About</a>
        <a href="projects.html" class="hover:underline text-sm sm:text-base">Projects</a>
        <a href="contact.html" class="hover:underline text-sm sm:text-base">Contact</a>
        <button
          @click="dark = !dark"
          class="bg-gray-300 dark:bg-gray-700 px-2 py-1 rounded text-xs sm:text-sm"
        >
          <span x-text="dark ? 'Light' : 'Dark'"></span> Mode
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
      <h1 class="text-2xl sm:text-3xl font-bold mb-4 sm:mb-6">Contact</h1>
      <p class="text-base sm:text-lg mb-4 sm:mb-6">Feel free to reach out using the form below.</p>

      <form
        action="https://formspree.io/f/xvgkwoew"
        method="POST"
        class="space-y-4"
      >
        <div>
          <label class="block mb-1 text-sm font-medium" for="name">Name</label>
          <input
            type="text"
            name="name"
            id="name"
            required
            class="w-full px-3 sm:px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm sm:text-base"
            placeholder="Your name"
          />
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium" for="email"
            >Email</label
          >
          <input
            type="email"
            name="email"
            id="email"
            required
            class="w-full px-3 sm:px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm sm:text-base"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <label class="block mb-1 text-sm font-medium" for="message"
            >Message</label
          >
          <textarea
            name="message"
            id="message"
            rows="5"
            required
            class="w-full px-3 sm:px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white text-sm sm:text-base"
            placeholder="Your message..."
          ></textarea>
        </div>

        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition text-sm sm:text-base"
        >
          Send Message
        </button>
      </form>
    </main>
    <!-- Footer -->
    <footer class="pb-3">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 flex flex-col items-center">
        <!-- Social Icon Buttons -->
        <div class="flex space-x-4 sm:space-x-6 mb-2 sm:mb-4">
          <a
            href="https://github.com/emmethamell"
            target="_blank"
            class="text-gray-600 dark:text-gray-300 hover:text-blue-500"
            aria-label="GitHub"
          >
            <svg fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 sm:w-7 sm:h-7">
              <path
                fill-rule="evenodd"
                d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.157-1.11-1.465-1.11-1.465-.908-.62.069-.608.069-.608 1.004.07 1.532 1.033 1.532 1.033.892 1.53 2.341 1.088 2.91.833.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.945 0-1.09.39-1.98 1.029-2.676-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.503.337 1.908-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.696 1.028 1.586 1.028 2.676 0 3.843-2.337 4.687-4.565 4.935.359.31.678.921.678 1.856 0 1.338-.012 2.418-.012 2.745 0 .268.18.58.688.481A10.005 10.005 0 0022 12c0-5.523-4.477-10-10-10z"
                clip-rule="evenodd"
              />
            </svg>
          </a>
          <a
            href="https://linkedin.com/in/emmethamell"
            target="_blank"
            class="text-gray-600 dark:text-gray-300 hover:text-blue-500"
            aria-label="LinkedIn"
          >
            <svg fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6 sm:w-7 sm:h-7">
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
          </a>
        </div>

        <!-- Copyright and Built With Text -->
        <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 text-center mb-1">
          &copy; 2025 Emmet Hamell. All rights reserved.
        </p>
        <p class="text-xs sm:text-sm text-gray-500 dark:text-gray-400 text-center">
          This website was built using
          <a
            href="https://alpinejs.dev/"
            target="_blank"
            class="font-bold underline hover:text-blue-500"
            >Alpine.js</a
          >
          and
          <a
            href="https://tailwindcss.com/"
            target="_blank"
            class="font-bold underline hover:text-blue-500"
            >TailwindCSS</a
          >.
        </p>
      </div>
    </footer>
  </body>
</html>
