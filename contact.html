<!doctype html>
<html
  lang="en"
  x-data="{ dark: localStorage.getItem('dark') === 'true' }"
  x-init="$watch('dark', val => localStorage.setItem('dark', val))"
  :class="{ 'dark': dark }"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Emmet Hamell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen transition-colors duration-300"
  >
    <!-- Navbar -->
    <nav
      class="flex justify-between items-center py-4 px-6 bg-gray-200 dark:bg-gray-800"
    >
      <div class="font-bold text-xl">Emmet Hamell</div>
      <div class="flex items-center space-x-6">
        <a href="index.html" class="hover:underline">About</a>
        <a href="Projects.html" class="hover:underline">Projects</a>
        <a href="contact.html" class="hover:underline">Contact</a>
        <button
          @click="dark = !dark"
          class="bg-gray-300 dark:bg-gray-700 px-2 py-1 rounded text-sm"
        >
          <span x-text="dark ? 'Light' : 'Dark'"></span> Mode
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-3xl mx-auto px-6 py-10">
      <h1 class="text-3xl font-bold mb-4">Contact</h1>
      <p class="text-lg leading-relaxed">Contact me here</p>
    </main>
  </body>
</html>
