<!doctype html>
<html
  lang="en"
  x-data="{ dark: localStorage.getItem('dark') === 'true' }"
  x-init="$watch('dark', val => localStorage.setItem('dark', val))"
  :class="{ 'dark': dark }"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Emmet Hamell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body
    class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white min-h-screen transition-colors duration-300"
  >
    <!-- Navbar -->
    <nav class="flex justify-between items-center py-4 px-6 bg-gray-200 dark:bg-gray-800">
      <div class="font-bold text-xl">Emmet Hamell</div>
      <div class="flex items-center space-x-6">
        <a href="index.html" class="hover:underline">About</a>
        <a href="projects.html" class="hover:underline">Projects</a>
        <a href="contact.html" class="hover:underline">Contact</a>
        <button
          @click="dark = !dark"
          class="bg-gray-300 dark:bg-gray-700 px-2 py-1 rounded text-sm"
        >
          <span x-text="dark ? 'Light' : 'Dark'"></span> Mode
        </button>
      </div>
    </nav>

    <!-- Page Content -->
    <main class="max-w-3xl mx-auto px-6 py-10">
      <h1 class="text-3xl font-bold mb-6">Contact</h1>
      <p class="text-lg mb-6">Feel free to reach out using the form below.</p>

      <form
      action="https://formspree.io/f/xvgkwoew"
      method="POST"
      class="space-y-4"
    >
      <div>
        <label class="block mb-1 text-sm font-medium" for="name">Name</label>
        <input
          type="text"
          name="name"
          id="name"
          required
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white"
          placeholder="Your name"
        />
      </div>
    
      <div>
        <label class="block mb-1 text-sm font-medium" for="email">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white"
          placeholder="you@example.com"
        />
      </div>
    
      <div>
        <label class="block mb-1 text-sm font-medium" for="message">Message</label>
        <textarea
          name="message"
          id="message"
          rows="5"
          required
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-900 dark:text-white"
          placeholder="Your message..."
        ></textarea>
      </div>
    
      <button
        type="submit"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded transition"
      >
        Send Message
      </button>
    </form>
    </main>
  </body>
</html>
